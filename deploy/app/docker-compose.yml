services:
  english-coach-app:
    build:
      context: ../../frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_CONVERSATION_FUNCTION_URL: ${VITE_CONVERSATION_FUNCTION_URL}
    restart: unless-stopped
    networks:
      - web

networks:
  web:
    external: true
